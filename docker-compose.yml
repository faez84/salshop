version: '3'

services:
  nginx:
    build:
      context: .
      dockerfile: ./container/nginx/Dockerfile
    volumes:
      - ./app:/app
    ports:
      - "8000:80"
      - "444:443"
    depends_on:
      - app
    networks:
      - shop_net
  app:
    build:
      context: .
      dockerfile: ./container/symfony/Dockerfile
    #image: faezsal/sal-shop-app:v0.0.4
    volumes:
      - ./app:/app
    environment:
      DATABASE_URL: mysql://root:root@db/shopnewnew
    #command:  y|composer install --working-dir=/var/www/app
    depends_on:
      - redis
    networks:
      - shop_net
  db:
    image: mysql:8
    command:
      --mysql-native-password=ON
    environment:
      MYSQL_DATABASE: shopnewnew
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3345:3306"
    volumes:
      - ./data/mysql_shop/:/var/lib/mysql:cached
    networks:
      - shop_net
  redis:
    container_name: container_redis
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - shop_net
  varnish:
    container_name: shop-varnish
    tty: true
    depends_on:
      - nginx
    build:
      context: .
      dockerfile: ./container/varnish/Dockerfile
    networks:
      - shop_net
    ports:
      - 5003:80
    command: 'sh start'
    volumes:
      - ./container/varnish/varnish.vcl:/etc/varnish/default.vcl
  # elasticsearch:
  #   image: elasticsearch:7.8.1
  #   ports:
  #     - 9200:9200
  #   environment:
  #     discovery.type: 'single-node'
  #     xpack.security.enabled: false
  #     ELASTIC_PASSWORD: '111111'
  #     ES_JAVA_OPTS: '-Xmx2g -Xms2g'
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.13
    container_name: elasticsearch
    environment:
    - discovery.type=single-node
    - xpack.security.enabled=false
    - bootstrap.memory_lock=true
    - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    networks:
      - shop_net
  kibana:
    image: kibana:7.8.1
    volumes:
      - ./kibana.yml:/usr/share/kibana/config/kibana.yml
    ports:
      - 5601:5601
    networks:
      - shop_net
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - 5673:5672
      - 15673:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - shop_net
volumes:
  rabbitmq_data:

networks:
  shop_net:
