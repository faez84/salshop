[www]
; Throughput-oriented defaults for this app profile.
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Recycle workers to prevent long-lived memory growth.
pm.max_requests = 1000

; Relevant when switching pm=ondemand.
pm.process_idle_timeout = 15s

; Protect workers from very long-running requests.
request_terminate_timeout = 120s

; Keep logs visible in container runtime.
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
