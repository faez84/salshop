framework:
    messenger:
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 10000
            checkout_async:
                dsn: '%env(MESSENGER_CHECKOUT_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 5
                    delay: 1000
                    multiplier: 2
                    max_delay: 30000
            failed:
                dsn: '%env(MESSENGER_FAILED_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 0
            sync: 'sync://'

        default_bus: messenger.bus.command

        buses:
            messenger.bus.command: []
            messenger.bus.query: []

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async
            App\Checkout\Infrastructure\Messaging\Command\FinalizeOrderCommand: checkout_async
            App\Shared\Infrastructure\Messaging\LoadTest\QueueLoadTestMessage: async

            # Route your messages to the transports
            # 'App\Message\YourMessage': async
