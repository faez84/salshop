doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: false
        mappings:
            CatalogInfrastructure:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Catalog/Infrastructure/Persistence/Doctrine'
                prefix: 'App\Catalog\Infrastructure\Persistence\Doctrine'
                alias: CatalogInfrastructure
            CheckoutInfrastructure:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Checkout/Infrastructure/Persistence/Doctrine'
                prefix: 'App\Checkout\Infrastructure\Persistence\Doctrine'
                alias: CheckoutInfrastructure
            UserInfrastructure:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/User/Infrastructure/Persistence/Doctrine'
                prefix: 'App\User\Infrastructure\Persistence\Doctrine'
                alias: UserInfrastructure   
            AddressInfrastructure:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Address/Infrastructure/Persistence/Doctrine'
                prefix: 'App\Address\Infrastructure\Persistence\Doctrine'
                alias: AddressInfrastructure   

        controller_resolver:
            auto_mapping: false
        dql:
            datetime_functions:
                date_format: DoctrineExtensions\Query\Mysql\DateFormat
when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        dbal:
            replicas:
                replica1:
                    url: '%env(resolve:DATABASE_REPLICA_URL)%'
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
