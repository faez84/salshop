# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    env(ELASTICSEARCH_HOSTS): 'http://elasticsearch:9200'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        public: true
    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/DataFixtures/'
            - '../src/**/Domain/Entity/'
            - '../src/Factory/'


            - '../src/Kernel.php'

    Elastic\Elasticsearch\Client:
        factory: ['@App\Service\Search\ElasticsearchClientFactory', 'create']
        arguments:
            - '%env(string:ELASTICSEARCH_HOSTS)%'

#    payment.PaymentMethodValidator:
 #       class: App\Service\Payment\PaymentMethodValidator

    #App\Service\Order\IOrderStateManager: '@App\Service\Order\OrderStateManager'
    #App\Service\Order\IStockReservationManager: '@App\Service\Order\StockReservationManager'
    #App\Service\Promotion\IPromotionManager: '@App\Service\Promotion\PromotionManager'
    App\Shared\Infrastructure\Observability\RequestContextProcessor:
        tags:
            - { name: monolog.processor }

    #App\EventSubscriber\CatalogCacheInvalidationSubscriber:
     #   tags:
      #      - { name: doctrine.event_subscriber }

    App\ApiPlatform\OrderOwnerExtension:
        tags:
            - { name: 'api_platform.doctrine.orm.query_extension.collection' }
            - { name: 'api_platform.doctrine.orm.query_extension.item' }

    App\ApiPlatform\AddressOwnerExtension:
        tags:
            - { name: 'api_platform.doctrine.orm.query_extension.collection' }
            - { name: 'api_platform.doctrine.orm.query_extension.item' }

    App\Address\Application\Port\Persistence\IAddressRepository:
        alias: App\Address\Infrastructure\Persistence\Doctrine\AddressRepository
    App\Basket\Application\Port\IProductReadRepository:
        alias: App\Basket\Infrastructure\Persistence\Doctrine\BasketProductReadRepository


 
