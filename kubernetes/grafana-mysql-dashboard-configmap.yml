apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mysql-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: monitoring
data:
  mysql-kubernetes-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "decimals": 0,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": 0
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "max(mysql_up{instance=~\"$instance\"})",
              "legendFormat": "up",
              "refId": "A"
            }
          ],
          "title": "MySQL Up",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rate(mysql_global_status_queries{instance=~\"$instance\"}[$__rate_interval])) or sum(rate(mysql_global_status_questions{instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "qps",
              "refId": "A"
            }
          ],
          "title": "Query Throughput",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(mysql_global_status_threads_connected{instance=~\"$instance\"})",
              "legendFormat": "connected",
              "refId": "A"
            }
          ],
          "title": "Threads Connected",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rate(mysql_global_status_slow_queries{instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "slow/s",
              "refId": "A"
            }
          ],
          "title": "Slow Queries/s",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum by (instance) (rate(mysql_global_status_queries{instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}} queries/s",
              "refId": "A"
            },
            {
              "expr": "sum by (instance) (rate(mysql_global_status_questions{instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}} questions/s",
              "refId": "B"
            }
          ],
          "title": "Query Throughput by Instance",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum by (instance) (mysql_global_status_threads_connected{instance=~\"$instance\"})",
              "legendFormat": "{{instance}} connected",
              "refId": "A"
            },
            {
              "expr": "sum by (instance) (mysql_global_status_threads_running{instance=~\"$instance\"})",
              "legendFormat": "{{instance}} running",
              "refId": "B"
            }
          ],
          "title": "Threads Connected vs Running",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum by (instance) (rate(mysql_global_status_bytes_received{instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}} bytes in",
              "refId": "A"
            },
            {
              "expr": "sum by (instance) (rate(mysql_global_status_bytes_sent{instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}} bytes out",
              "refId": "B"
            }
          ],
          "title": "Network Throughput (Bytes In/Out)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "id": 8,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum by (instance) (rate(mysql_global_status_aborted_connects{instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}} aborted connects/s",
              "refId": "A"
            },
            {
              "expr": "sum by (instance) (rate(mysql_global_status_connection_errors_total{instance=~\"$instance\"}[$__rate_interval]))",
              "legendFormat": "{{instance}} conn errors/s",
              "refId": "B"
            }
          ],
          "title": "Connection Errors",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 21
          },
          "id": 9,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "100 * (1 - (sum(rate(mysql_global_status_innodb_buffer_pool_reads{instance=~\"$instance\"}[$__rate_interval])) / clamp_min(sum(rate(mysql_global_status_innodb_buffer_pool_read_requests{instance=~\"$instance\"}[$__rate_interval])), 1)))",
              "legendFormat": "buffer pool hit ratio %",
              "refId": "A"
            }
          ],
          "title": "InnoDB Buffer Pool Hit Ratio",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 21
          },
          "id": 10,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum by (instance) (mysql_global_status_innodb_buffer_pool_bytes_data{instance=~\"$instance\"})",
              "legendFormat": "{{instance}} data",
              "refId": "A"
            },
            {
              "expr": "sum by (instance) (mysql_global_status_innodb_buffer_pool_bytes_dirty{instance=~\"$instance\"})",
              "legendFormat": "{{instance}} dirty",
              "refId": "B"
            }
          ],
          "title": "InnoDB Buffer Pool Usage",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "mysql",
        "database",
        "kubernetes",
        "salshop"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": ".*",
              "value": ".*"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(mysql_up, instance)",
            "hide": 0,
            "includeAll": true,
            "label": "Instance",
            "multi": false,
            "name": "instance",
            "options": [],
            "query": {
              "query": "label_values(mysql_up, instance)",
              "refId": "Prometheus-instance-Variable-Query"
            },
            "refresh": 2,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Salshop MySQL Kubernetes Monitoring",
      "uid": "salshop-mysql-k8s-monitoring",
      "version": 1,
      "weekStart": ""
    }
