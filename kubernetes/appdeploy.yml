apiVersion: apps/v1
kind: Deployment
metadata:
  name: symfony-shop-deploy3
  labels:
    app: symfony-shop-deploy3
    type: fe-end
spec:
  replicas: 2
  selector:
    matchLabels:
      app: symfony-shopapp-new3
      type: fe-end
  template:
    metadata:
      name: symfony-shopapp-new3
      labels:
        app: symfony-shopapp-new3
        type: fe-end
    spec:
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: sync-app-code
          image: faezsal/symfony-shop-app:3.4.9
          command:
            - /bin/sh
            - -lc
            - |
              apt-get update && apt-get install -y --no-install-recommends rsync && \
              rsync -a --delete /app/app/ /var/www/html/ && \
              mkdir -p /var/www/html/var/cache /var/www/html/var/log /var/www/html/public/images/products && \
              chown -R 1000:33 /var/www/html/var /var/www/html/public/images/products && \
              chmod -R ug+rwX /var/www/html/var /var/www/html/public/images/products
          volumeMounts:
            - mountPath: /var/www/html
              name: app-code

      containers:
        - name: symfony-shopapp-new3
          image: faezsal/symfony-shop-app:3.4.9
          imagePullPolicy: Always
          env:
            - name: APP_ENV
              value: prod
            - name: APP_DEBUG
              value: "1"
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: DATABASE_URL
            - name: DATABASE_REPLICA_URL
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: DATABASE_REPLICA_URL
            - name: REDIS_URL
              value: redis://redis:6379
            - name: CACHE_ADAPTER
              value: cache.adapter.redis
            - name: SESSION_HANDLER_DSN
              value: redis://redis:6379
            - name: LOCK_DSN
              value: redis://redis:6379
            - name: PAYPAL_BASE_URL
              value: https://api-m.sandbox.paypal.com
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: PAYPAL_CLIENT_ID
            - name: PAYPAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: PAYPAL_CLIENT_SECRET
            - name: MESSENGER_TRANSPORT_DSN
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: MESSENGER_TRANSPORT_DSN
            - name: MESSENGER_CHECKOUT_TRANSPORT_DSN
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: MESSENGER_CHECKOUT_TRANSPORT_DSN
            - name: MESSENGER_FAILED_TRANSPORT_DSN
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: MESSENGER_FAILED_TRANSPORT_DSN
          ports:
            - containerPort: 9000
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          volumeMounts:
            - mountPath: /var/www/html
              name: app-code
                  
    # Our nginx container, which uses the configuration declared above,
    # along with the files shared with the PHP-FPM app.
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /nginx-health
              port: 80
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: nginx-config-volume3
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - mountPath: /var/www/html/
              name: app-code
      volumes:
        - name: app-code
          emptyDir: {}
        # Add the ConfigMap we declared above as a volume for the pod
        - name: nginx-config-volume3
          configMap:
            name: nginx-config-draft32           
