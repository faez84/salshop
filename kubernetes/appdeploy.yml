apiVersion: apps/v1
kind: Deployment
metadata:
  name: symfony-shop-deploy3
  labels:
    app: symfony-shop-deploy3
    type: fe-end
spec:
  replicas: 2
  selector:
    matchLabels:
      app: symfony-shopapp-new3
      type: fe-end
  template:
    metadata:
      name: symfony-shopapp-new3
      labels:
        app: symfony-shopapp-new3
        type: fe-end
    spec:

      containers:
        - name: symfony-shopapp-new3
          image: faezsal/symfony-shop-app:3.1.1
          env:
            - name: APP_ENV
              value: prod
            - name: APP_DEBUG
              value: "1"
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: DATABASE_URL
            - name: DATABASE_REPLICA_URL
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: DATABASE_REPLICA_URL
            - name: REDIS_URL
              value: redis://redis:6379
            - name: CACHE_ADAPTER
              value: cache.adapter.redis
            - name: SESSION_HANDLER_DSN
              value: redis://redis:6379
            - name: LOCK_DSN
              value: redis://redis:6379
            - name: PAYPAL_BASE_URL
              value: https://api-m.sandbox.paypal.com
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: PAYPAL_CLIENT_ID
            - name: PAYPAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: PAYPAL_CLIENT_SECRET
            - name: MESSENGER_TRANSPORT_DSN
              value: doctrine://default?queue_name=async
            - name: MESSENGER_CHECKOUT_TRANSPORT_DSN
              value: doctrine://default?queue_name=checkout_async
          ports:
            - containerPort: 9000
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          volumeMounts:
            - mountPath: /var/www/html
              name: my-volume4
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - cp -r /app/app/. /var/www/html && mkdir -p /var/www/html/var/cache /var/www/html/var/log /var/www/html/public/images/products && chown -R www-data:www-data /var/www/html/var /var/www/html/public/images/products && chmod -R ug+rwX /var/www/html/var /var/www/html/public/images/products
              # ["/bin/sh", "-c", "cp -r /app/. /var/www/html & cd /var/www/html &  sed  -i  's/bbbb@127.0.0.1/bbbb@10.111.32.190/g' .env & rm -rf var/cache/dev"]   
                # command: ["/bin/sh", "-c", "apt-get update && apt-get install nano"]  
             # exec:
              #  command: ["/bin/sh", "-c", "sed  -i  's/bbbb@127.0.0.1/bbbb@10.111.32.190/g' /var/www/html/.env"]  
              #command: ["/bin/sh", "-c", "y| php bin/console doctrine:migrations:migrate "]  
              #command: ["/bin/sh", "-c", "y| php bin/console doctrine:fixtures:load"]  
              #command: ["/bin/sh", "-c", "php bin/console tailwind:build"]  
                  
    # Our nginx container, which uses the configuration declared above,
    # along with the files shared with the PHP-FPM app.
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /nginx-health
              port: 80
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: nginx-config-volume3
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - mountPath: /var/www/html/
              name: my-volume4
      volumes:
        # Create the shared files volume to be used in both pods
        - name: shared-files
          emptyDir: {}
        - name: story-volume
          hostPath:
            path: /var/www/html
            type: DirectoryOrCreate
        - name: my-volume4
          persistentVolumeClaim:
            claimName: my-pvc4
        # Add the ConfigMap we declared above as a volume for the pod
        - name: nginx-config-volume3
          configMap:
            name: nginx-config-draft32           
