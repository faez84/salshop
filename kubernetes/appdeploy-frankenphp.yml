apiVersion: apps/v1
kind: Deployment
metadata:
  name: symfony-shop-deploy3
  labels:
    app: symfony-shop-deploy3
    type: fe-end
spec:
  replicas: 2
  selector:
    matchLabels:
      app: symfony-shopapp-new3
      type: fe-end
  template:
    metadata:
      name: symfony-shopapp-new3
      labels:
        app: symfony-shopapp-new3
        type: fe-end
    spec:
      containers:
        - name: symfony-shopapp-new3
          # Build and push a FrankenPHP-enabled image, then set it here.
          image: faezsal/symfony-shop-frankenphp:1.2.2
          imagePullPolicy: Always
          env:
            - name: APP_ENV
              value: prod
            - name: APP_DEBUG
              value: "0"
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: DATABASE_URL
            - name: DATABASE_REPLICA_URL
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: DATABASE_REPLICA_URL
            - name: REDIS_URL
              value: redis://redis:6379
            - name: CACHE_ADAPTER
              value: cache.adapter.redis
            - name: SESSION_HANDLER_DSN
              value: redis://redis:6379
            - name: LOCK_DSN
              value: redis://redis:6379
            - name: PAYPAL_BASE_URL
              value: https://api-m.sandbox.paypal.com
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: PAYPAL_CLIENT_ID
            - name: PAYPAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: PAYPAL_CLIENT_SECRET
            - name: MESSENGER_TRANSPORT_DSN
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: MESSENGER_TRANSPORT_DSN
            - name: MESSENGER_CHECKOUT_TRANSPORT_DSN
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: MESSENGER_CHECKOUT_TRANSPORT_DSN
            - name: MESSENGER_FAILED_TRANSPORT_DSN
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-secrets
                  key: MESSENGER_FAILED_TRANSPORT_DSN
            - name: SERVER_NAME
              value: ":80"
            - name: APP_RUNTIME
              value: Runtime\FrankenPhpSymfony\Runtime
            - name: FRANKENPHP_CONFIG
              value: |
                num_threads 24
                worker /app/public/index.php 16
          command:
            - sh
            - -lc
            - |
              if [ ! -f /app/vendor/autoload.php ] && [ -f /app/composer.json ]; then
                composer install --no-interaction --prefer-dist --no-dev
              fi
              FRANKENPHP_BIN="$(command -v frankenphp || true)"
              if [ -z "$FRANKENPHP_BIN" ] && [ -x /usr/local/bin/frankenphp ]; then FRANKENPHP_BIN=/usr/local/bin/frankenphp; fi
              if [ -z "$FRANKENPHP_BIN" ] && [ -x /usr/bin/frankenphp ]; then FRANKENPHP_BIN=/usr/bin/frankenphp; fi
              if [ -z "$FRANKENPHP_BIN" ]; then
                echo "frankenphp binary not found in image (PATH=$PATH)"
                ls -la /usr/local/bin /usr/bin || true
                exit 127
              fi
              exec "$FRANKENPHP_BIN" run -c /etc/frankenphp/Caddyfile
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health/live
              port: 80
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: 80
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          volumeMounts:
            - name: frankenphp-caddyfile
              mountPath: /etc/frankenphp/Caddyfile
              subPath: Caddyfile
      volumes:
        - name: frankenphp-caddyfile
          configMap:
            name: frankenphp-config
