apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k6-requests
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: monitoring
data:
  k6-kubernetes-request-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rate(k6_http_reqs_total[$__rate_interval]))",
              "legendFormat": "requests/s",
              "refId": "A"
            }
          ],
          "title": "Request Rate1",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 3,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "100 * (avg(k6_http_req_failed_rate{testid=~\"$testid\",scenario=~\"$scenario\"}) or (sum(rate(k6_http_req_failed_total{testid=~\"$testid\",scenario=~\"$scenario\"}[$__rate_interval])) / clamp_min(sum(rate(k6_http_reqs_total{testid=~\"$testid\",scenario=~\"$scenario\"}[$__rate_interval])), 1)))",
              "legendFormat": "failed %",
              "refId": "A"
            }
          ],
          "title": "Failed Request Rate",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "k6_http_req_duration_p95 or (histogram_quantile(0.95, sum(rate(k6_http_req_duration_seconds_bucket[$__rate_interval])) by (le)) * 1000)",
              "legendFormat": "p95",
              "refId": "A"
            }
          ],
          "title": "HTTP Duration p95",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "k6_http_req_duration_p99 or (histogram_quantile(0.99, sum(rate(k6_http_req_duration_seconds_bucket[$__rate_interval])) by (le)) * 1000)",
              "legendFormat": "p99",
              "refId": "A"
            }
          ],
          "title": "HTTP Duration p99",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 16,
            "y": 0
          },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "k6_http_req_duration_avg or ((sum(rate(k6_http_req_duration_seconds_sum[$__rate_interval])) / clamp_min(sum(rate(k6_http_req_duration_seconds_count[$__rate_interval])), 1)) * 1000)",
              "legendFormat": "avg",
              "refId": "A"
            }
          ],
          "title": "HTTP Duration avg",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 20,
            "y": 0
          },
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(rate(k6_dropped_iterations_total[$__rate_interval]))",
              "legendFormat": "dropped/s",
              "refId": "A"
            }
          ],
          "title": "Dropped Iterations/s",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum by (endpoint) (rate(k6_http_reqs_total{endpoint!=\"\"}[$__rate_interval]))",
              "legendFormat": "{{endpoint}}",
              "refId": "A"
            }
          ],
          "title": "Request Rate by Endpoint",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 8,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "k6_http_req_duration_p95",
              "legendFormat": "p95",
              "refId": "A"
            },
            {
              "expr": "k6_http_req_duration_p99",
              "legendFormat": "p99",
              "refId": "B"
            },
            {
              "expr": "k6_http_req_duration_avg",
              "legendFormat": "avg",
              "refId": "C"
            }
          ],
          "title": "HTTP Duration Over Time",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
