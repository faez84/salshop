              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas{namespace=~\"default|salshop\",deployment=\"symfony-shop-deploy3\"}",
              "legendFormat": "deployment spec replicas",
              "refId": "A"
