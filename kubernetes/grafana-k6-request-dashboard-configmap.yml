            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum by (container) (container_memory_working_set_bytes{namespace=~\"default|salshop\",container=~\"symfony-shopapp-new3|nginx\",container!=\"POD\"})",
              "legendFormat": "{{container}} working set",
              "refId": "A"
            }
          ],
          "title": "App Pod Memory by Container",
