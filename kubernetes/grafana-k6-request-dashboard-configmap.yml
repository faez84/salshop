            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 21
          },
          "id": 11,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=~\"default|salshop\",container=~\"symfony-shopapp-new3|nginx\",container!=\"POD\"}[$__rate_interval]))",
