          "id": 9,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "k6_home_duration_p95",
              "legendFormat": "home p95",
              "refId": "A"
            },
            {
              "expr": "k6_products_api_duration_p95",
              "legendFormat": "products_api p95",
              "refId": "B"
            },
            {
              "expr": "k6_categories_api_duration_p95",
              "legendFormat": "categories_api p95",
              "refId": "C"
            },
            {
              "expr": "k6_product_page_duration_p95",
              "legendFormat": "product_page p95",
              "refId": "D"
            },
            {
              "expr": "k6_health_duration_p95",
              "legendFormat": "health p95",
              "refId": "E"
            }
          ],
          "title": "Endpoint Trend Metrics p95",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "id": 10,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "sum(k6_vus)",
              "legendFormat": "active vus",
              "refId": "A"
            },
            {
              "expr": "sum(k6_vus_max)",
              "legendFormat": "max vus",
              "refId": "B"
            },
            {
              "expr": "sum(rate(k6_dropped_iterations_total[$__rate_interval]))",
              "legendFormat": "dropped iterations/s",
              "refId": "C"
            }
          ],
          "title": "VUs and Dropped Iterations",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
