apiVersion: v1
kind: ConfigMap
metadata:
  name: symfony-shop-db-primary-init
data:
  01-create-replication-user.sh: |
    #!/bin/sh
    set -eu

    mysql -uroot -p"${MYSQL_ROOT_PASSWORD}" <<-EOSQL
      CREATE USER IF NOT EXISTS '${MYSQL_REPLICATION_USER}'@'%' IDENTIFIED BY '${MYSQL_REPLICATION_PASSWORD}';
      GRANT REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO '${MYSQL_REPLICATION_USER}'@'%';
      FLUSH PRIVILEGES;
    EOSQL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: symfony-shop-db-primary
  labels:
    app: symfony-shop-db
    role: primary
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: symfony-shop-db
      role: primary
  template:
    metadata:
      labels:
        app: symfony-shop-db
        role: primary
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --server-id=1
            - --log-bin=mysql-bin
            - --binlog-format=ROW
            - --gtid-mode=ON
            - --enforce-gtid-consistency=ON
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_REPLICATION_USER
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_REPLICATION_USER
            - name: MYSQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_REPLICATION_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "MYSQL_PWD=$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"
            periodSeconds: 10
            timeoutSeconds: 8
            failureThreshold: 40
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "MYSQL_PWD=$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"
            periodSeconds: 10
            timeoutSeconds: 8
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "MYSQL_PWD=$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"
            periodSeconds: 15
            timeoutSeconds: 8
            failureThreshold: 6
          volumeMounts:
            - name: mysql-primary-data
              mountPath: /var/lib/mysql
            - name: mysql-primary-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-primary-data
          persistentVolumeClaim:
            claimName: symfony-shop-db-pvc
        - name: mysql-primary-init
          configMap:
            name: symfony-shop-db-primary-init
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: symfony-shop-db-replica
  labels:
    app: symfony-shop-db
    role: replica
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: symfony-shop-db
      role: replica
  template:
    metadata:
      labels:
        app: symfony-shop-db
        role: replica
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --server-id=2
            - --relay-log=mysql-relay-bin
            - --read-only=ON
            - --super-read-only=ON
            - --gtid-mode=ON
            - --enforce-gtid-consistency=ON
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: APP_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_DATABASE
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_USER
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_REPLICATION_USER
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_REPLICATION_USER
            - name: MYSQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: symfony-shop-db-secret
                  key: MYSQL_REPLICATION_PASSWORD
          resources:
            requests:
              cpu: "400m"
              memory: "768Mi"
            limits:
              cpu: "1200m"
              memory: "1536Mi"
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    set +e
                    APP_DB="${APP_DB_NAME:-shopnewnew}"

                    # Wait for local mysqld to accept root credentials.
                    until mysqladmin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent; do
                      sleep 2
                    done

                    # Wait for primary database to be reachable with app user.
                    until mysqladmin ping -h service-symfony-shop-db -u"${APP_DB_USER}" -p"${APP_DB_PASSWORD}" --silent; do
                      sleep 2
                    done

                    # Seed replica from primary only when app database is missing.
                    DB_EXISTS="$(mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -Nse "SELECT SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME='${APP_DB}' LIMIT 1;")"
                    if [ "${DB_EXISTS}" != "${APP_DB}" ]; then
                      mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "STOP REPLICA; RESET REPLICA ALL; SET GLOBAL super_read_only=OFF; SET GLOBAL read_only=OFF;" || true
                      mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "CREATE DATABASE IF NOT EXISTS \`${APP_DB}\`;" || true
                      mysqldump -h service-symfony-shop-db -u"${APP_DB_USER}" -p"${APP_DB_PASSWORD}" --single-transaction --routines --triggers --set-gtid-purged=AUTO --databases "${APP_DB}" \
                        | mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" || true
                    fi

                    # Configure and start GTID replication.
                    mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "STOP REPLICA; RESET REPLICA ALL;" || true
                    mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "CHANGE REPLICATION SOURCE TO SOURCE_HOST='service-symfony-shop-db', SOURCE_PORT=3306, SOURCE_USER='${MYSQL_REPLICATION_USER}', SOURCE_PASSWORD='${MYSQL_REPLICATION_PASSWORD}', SOURCE_AUTO_POSITION=1, GET_SOURCE_PUBLIC_KEY=1, SOURCE_CONNECT_RETRY=3, SOURCE_RETRY_COUNT=86400;" || true
                    mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "START REPLICA; SET GLOBAL read_only=ON; SET GLOBAL super_read_only=ON;" || true

                    # Self-heal common duplicate-user conflict on previously repaired replicas.
                    i=0
                    while [ "$i" -lt 30 ]; do
                      LAST_SQL_ERRNO="$(mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "SHOW REPLICA STATUS\\G" | awk '/Last_SQL_Errno:/ {print $2}' | tail -1)"
                      if [ "${LAST_SQL_ERRNO}" = "1396" ]; then
                        mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "SET GLOBAL super_read_only=OFF; SET GLOBAL read_only=OFF; STOP REPLICA SQL_THREAD; DROP USER IF EXISTS '${APP_DB_USER}'@'%'; START REPLICA SQL_THREAD; SET GLOBAL read_only=ON; SET GLOBAL super_read_only=ON;" || true
                        break
                      fi
                      if [ "${LAST_SQL_ERRNO}" = "0" ]; then
                        break
                      fi
                      i=$((i+1))
                      sleep 2
                    done

                    mysql -h127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" -e "SHOW REPLICA STATUS\\G" || true

                    # Keep pod alive even if source is briefly unavailable during startup.
                    exit 0
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "MYSQL_PWD=$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"
            periodSeconds: 10
            timeoutSeconds: 8
            failureThreshold: 40
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "MYSQL_PWD=$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"
            periodSeconds: 10
            timeoutSeconds: 8
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "MYSQL_PWD=$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"
            periodSeconds: 15
            timeoutSeconds: 8
            failureThreshold: 6
          volumeMounts:
            - name: mysql-replica-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-replica-data
          persistentVolumeClaim:
            claimName: symfony-shop-db-replica-pvc-v2
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: symfony-shop-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: symfony-shop-db-replica-pvc-v2
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
