apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: symfony-shop-app-rps-scaledobject
  namespace: default
spec:
  scaleTargetRef:
    kind: Deployment
    name: symfony-shop-deploy3
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 2
  maxReplicaCount: 12
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: symfony_shop_ingress_rps
        query: >
          sum(rate(nginx_ingress_controller_requests{
            namespace="default",
            ingress="ingress-symfony-shopapp-new3"
          }[1m]))
        threshold: "20"
        activationThreshold: "5"
