
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sal-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/var/www/html"

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sal-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi